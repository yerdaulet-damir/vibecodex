<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0d0d0d"/>
  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="11.5" stroke="#00d4aa" stroke-opacity="0.25"/>

  <!-- Top-left scan line accent -->
  <line x1="8" y1="14" x2="56" y2="14" stroke="#00d4aa" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Prompt chevron > -->
  <path d="M14 28 L22 32 L14 36" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Underscore cursor -->
  <rect x="25" y="37" width="10" height="2.5" rx="1" fill="#00d4aa"/>

  <!-- Bottom label: vc -->
  <text x="32" y="52" font-family="'Geist Mono', 'JetBrains Mono', monospace" font-size="9" font-weight="500" fill="#00d4aa" fill-opacity="0.5" text-anchor="middle" letter-spacing="1">vc</text>
</svg>
